<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA NIM Model Benchmarks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
        }

        h1 {
            font-size: 2.5em;
            color: #76c893;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(118, 200, 147, 0.3);
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1.1em;
            margin-top: 10px;
        }

        .prompt-section {
            background: rgba(15, 52, 96, 0.5);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .prompt-section h2 {
            color: #76c893;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .prompt-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-left: 3px solid #76c893;
            border-radius: 4px;
            font-style: italic;
            color: #d0d0d0;
        }

        .last-updated {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9em;
            margin: 20px 0;
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .model-card {
            background: rgba(15, 52, 96, 0.4);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .model-card:hover {
            background: rgba(15, 52, 96, 0.6);
            border-color: #76c893;
            box-shadow: 0 0 20px rgba(118, 200, 147, 0.2);
            transform: translateY(-2px);
        }

        .model-card h3 {
            color: #76c893;
            margin-bottom: 15px;
            font-size: 1.1em;
            word-break: break-word;
        }

        .model-stats {
            display: grid;
            gap: 12px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-size: 0.95em;
        }

        .stat-label {
            color: #a0a0a0;
            font-weight: 500;
        }

        .stat-value {
            color: #76c893;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .response-text {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #76c893;
            border-radius: 4px;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
            color: #d0d0d0;
            line-height: 1.5;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-success {
            background: rgba(118, 200, 147, 0.2);
            color: #76c893;
            border: 1px solid #76c893;
        }

        .status-error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #0f3460;
            border-top: 4px solid #76c893;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .models-grid {
                grid-template-columns: 1fr;
            }

            .model-card {
                padding: 15px;
            }
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .sort-btn {
            background: rgba(118, 200, 147, 0.1);
            border: 1px solid #76c893;
            color: #76c893;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        .sort-btn:hover, .sort-btn.active {
            background: #76c893;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 NVIDIA NIM Model Benchmarks</h1>
            <p class="subtitle">Real-time performance testing of code generation models</p>
            <p class="last-updated">Last updated: <span id="lastUpdated">Loading...</span></p>
        </header>

        <div class="prompt-section">
            <h2>Test Prompt</h2>
            <div class="prompt-text" id="promptText">Loading...</div>
        </div>

        <div class="sort-controls">
            <button class="sort-btn active" onclick="sortBy('name')">Sort by Name</button>
            <button class="sort-btn" onclick="sortBy('responseTime')">Fastest First</button>
            <button class="sort-btn" onclick="sortBy('tokens')">Most Tokens</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading benchmark results...</p>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentSort = 'name';

        async function loadResults() {
            try {
                const response = await fetch('results.json');
                if (!response.ok) throw new Error('Failed to load results');
                
                const data = await response.json();
                allData = data.models || [];
                
                document.getElementById('promptText').textContent = data.prompt || 'No prompt data';
                
                const date = new Date(data.timestamp);
                document.getElementById('lastUpdated').textContent = date.toLocaleString();
                
                sortBy(currentSort);
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error-message">
                        <strong>Error loading results:</strong> ${error.message}<br>
                        <small>Make sure results.json exists in the repository.</small>
                    </div>
                `;
            }
        }

        function sortBy(field) {
            currentSort = field;
            
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            let sorted = [...allData];
            
            if (field === 'name') {
                sorted.sort((a, b) => a.model.localeCompare(b.model));
            } else if (field === 'responseTime') {
                sorted.sort((a, b) => {
                    const timeA = a.responseTime || Infinity;
                    const timeB = b.responseTime || Infinity;
                    return timeA - timeB;
                });
            } else if (field === 'tokens') {
                sorted.sort((a, b) => {
                    const tokensA = a.tokensGenerated || 0;
                    const tokensB = b.tokensGenerated || 0;
                    return tokensB - tokensA;
                });
            }
            
            renderResults(sorted);
        }

        function renderResults(models) {
            if (!models || models.length === 0) {
                document.getElementById('content').innerHTML = '<div class="error-message">No benchmark data available yet.</div>';
                return;
            }
            
            const html = models.map(model => `
                <div class="model-card">
                    <h3>${escapeHtml(model.model)}</h3>
                    <div class="model-stats">
                        <div class="stat-row">
                            <span class="stat-label">Response Time:</span>
                            <span class="stat-value">${model.responseTime ? (model.responseTime / 1000).toFixed(2) + 's' : 'N/A'}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Tokens Generated:</span>
                            <span class="stat-value">${model.tokensGenerated || 'N/A'}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Total Tokens:</span>
                            <span class="stat-value">${model.totalTokens || 'N/A'}</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">Status:</span>
                            <span class="status-badge ${model.success ? 'status-success' : 'status-error'}">
                                ${model.success ? '✓ Success' : '✗ Failed'}
                            </span>
                        </div>
                    </div>
                    ${model.response ? `<div class="response-text"><strong>Response Preview:</strong><br>${escapeHtml(model.response.substring(0, 300))}${model.response.length > 300 ? '...' : ''}</div>` : ''}
                    ${model.error ? `<div class="error-message"><strong>Error:</strong> ${escapeHtml(model.error)}</div>` : ''}
                </div>
            `).join('');
            
            document.getElementById('content').innerHTML = `<div class="models-grid">${html}</div>`;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
        }

        loadResults();
        setInterval(loadResults, 30000);
    </script>
</body>
</html>
